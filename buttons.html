
<!-- Paragraph element -->
<p>
	My Biggie Buttons:
</p> 


<!-- YouTube's "Subscribe" button element -->
<button class="subscribe">
	SUBSCRIBE
</button>


<!-- YouTube's "Join" button element -->
<button class="join">
	JOIN
</button>


<!-- Twitter's "Tweet" button element -->
<button class="tweet">
	Tweet
</button>


<!-- Overly Animated Graphical Control Element -->
<button class="overly">
	Overly Animated Graphical Control Element
</button>


<!-- CSS code inside this cutie -->
<style>
	/* YouTube's "Subscribe" button element */
	.subscribe /*Selector*/
	{
		/*Properties*/

		margin-left : 8px;
		margin-right: 8px;
		border: none;
		border-radius: 3px;
		padding-left: 16px;
		padding-right: 16px;
		padding-top: 10px;
		padding-bottom: 10px;
		vertical-align: top;

		color: white;
		background-color: rgb(225, 0, 0);
		font-size: 15px;

		cursor: pointer;
		transition: opacity 0.05s;
	}
	.subscribe:hover /*{hover} is a pseudo-class*/
	{
		opacity: 0.6;
	}
	.subscribe:active
	{
		opacity: 0.5;
	}


	/* YouTube's "Join" button element */
	.join
	{
		margin-right: 8px;
		border-style: solid;
		border-width: 1px;
		border-radius: 3px;
		border-color: rgb(90, 140, 255);
		padding-left: 15px;
		padding-right: 15px;
		padding-top: 9px;
		padding-bottom: 9px;
		vertical-align: top;
		
		color: rgb(90, 140, 255);
		background-color: white;
		font-size: 15px;

		cursor: pointer;
		transition: color 0.05s, background-color 0.1s;
	}
	.join:hover
	{
		color: white;
		background-color: rgb(90, 140, 255);
	}
	.join:active
	{
		opacity: 0.8;
	}


	/* Twitter's "Tweet" button element */
	.tweet
	{
		border: none;
		border-radius: 25px;
		padding-left: 16px;
		padding-right: 16px;
		padding-top: 10px;
		padding-bottom: 10px;
		vertical-align: top;

		color: white;
		background-color: rgb(0, 165, 255);
		font-size: 15px;
		font-weight: bold;

		cursor: pointer;
		transition: box-shadow 0.1s;
	}
	.tweet:hover
	{
		box-shadow: 0 1px 7px rgba(0, 0, 0, 0.2);
	}
	.tweet:active
	{
		opacity: 0.8;
	}


	/* Overly Animated Graphical Control Element */
	.overly
	{
		margin-left: 600px;
		border: none;
		border-radius: 3px;
		padding-left: 16px;
		padding-right: 16px;
		padding-top: 10px;
		padding-bottom: 10px;
		vertical-align: top;

		color: white;
		font-family: serif;
		font-weight: bold;
		font-size: 20px;
		background-color: rgb(0, 150, 75);
		box-shadow: 10px 10px 5px rgba(0, 0, 0, 0.1);

		cursor: pointer;
		transition: margin-left 0.5s, margin-top 0.5s, padding-top 0.75s, padding-bottom 0.75s, box-shadow 0.75s;
	}
	.overly:hover
	{
		margin-left: 620px;
		margin-top: 20px;
		padding-top: 250px;
		padding-bottom: 250px;

		background-image: url('image.jpg');
		background-blend-mode: multiply;
		background-size: cover;
		background-position: center;
		box-shadow: 10px 10px 5px rgba(0, 0, 0, 0.5);
	}
	.overly:active
	{
		margin-top: -125px;
		padding-top: 500;
		padding-bottom: 500px;
	}
</style>
